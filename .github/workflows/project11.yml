name: Project 11 - Direct FFmpeg Streamer

on:
  workflow_dispatch:
    inputs:
      stream_id:
        description: 'Select OK.ru Stream Server ID (1, 2, 3, or 4)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
        default: '1'
      ffmpeg_command:
        description: '👉 OPTION 1: Apni puri FFmpeg command yahan paste karein'
        required: false
        type: string
      m3u8_url:
        description: '👉 OPTION 2: Sirf Direct M3U8 Link paste karein'
        required: false
        type: string
      referer_url:
        description: '👉 OPTION 2: Referer Link (M3U8 ke sath agar zaroorat ho)'
        required: false
        type: string

jobs:
  record-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Ghante ki limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Magic Cleaner & Streamer
        env:
          STREAM_ID: ${{ inputs.stream_id }}
          FFMPEG_CMD: ${{ inputs.ffmpeg_command }}
          M3U8_URL: ${{ inputs.m3u8_url }}
          REFERER_URL: ${{ inputs.referer_url }}
        run: node runner.js






























