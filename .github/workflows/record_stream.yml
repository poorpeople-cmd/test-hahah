name: Record Live Stream with FFmpeg

on:
  workflow_dispatch: # Yeh aapko GitHub ke 'Actions' tab se manual run karne ki permission dega

jobs:
  record-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run FFmpeg Command
        # Aapki di hui command yahan run ho rahi hai
        run: |
          ffmpeg -headers "Referer: https://ppdd18.plaifrdcikf.shop/live.html?_pa=bWF0Y2hJZD0yODcxNzk0Jm10VGV4dD1mb290YmFsbCZzaXRlS2V5PThmdWJvJnNrcHROdW09M3Jk&_pb=1" -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36" -i "https://xxyznt1-cf.didjhfyu8yg.sbs/auth%%26cid%3DLfG-DIPusniBlBY331fSc260418%26_v%3D2%26_r%3DjoxXHG%26_vis%3D7cc4099e3b3b6af0b36f87a219cc2b290ede07f3923eb2ba850719a0b9639f30%26_vvs%3D873fa633f3e2c58994ce47ec7fb7bed3ffeac39c755057efa8db1a257a4b7e78%26_vas%3Dbc5e77ac748fe6a0194424109104571b591f05ae781867cc2385fb25819c77ee/app/c417448.m3u8" -c copy live_recording.ts

      - name: Upload Recording
        # Yeh step recording ko save karke aapko download link dega
        uses: actions/upload-artifact@v4
        with:
          name: live_video_recording
          path: live_recording.ts
