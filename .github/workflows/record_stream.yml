name: Record Live Stream with FFmpeg

on:
  workflow_dispatch:
    inputs:
      # Yeh wo input box hai jo run karte waqt show hoga
      ffmpeg_command:
        description: 'Apni puri FFmpeg command yahan paste karein (e.g., ffmpeg -i link -c copy output.ts)'
        required: true
        type: string

jobs:
  record-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Custom FFmpeg Command
        # Yahan tumhari di hui command run hogi
        run: |
          ${{ inputs.ffmpeg_command }}

      - name: Upload Recording
        uses: actions/upload-artifact@v4
        with:
          name: live_video_recording
          # Maine yahan wildcards (*.ts, *.mp4) laga diye hain.
          # Tum output ka naam jo bhi rakho, bas extension .ts ya .mp4 honi chahiye.
          path: |
            *.ts
            *.mp4
            *.mkv
